name: Deploy Vue to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: C:\Users\mczwi\Proton Drive\marczwiers\My files\Coding\Webapps\Auto AMP\Auto-AMP\dist
          # optional: force push to overwrite if necessary
          force_orphan: true